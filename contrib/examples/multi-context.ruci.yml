# Example job: Multi-context pipeline
# This example shows using different contexts for different job types
# Save as .ruci.yml in your project root

name: multi-context-pipeline
context: default
timeout: 300

env:
  CI: "true"

steps:
  - name: lint
    command: |
      echo "Running linters..."
      cargo fmt -- --check
      cargo clippy -- -D warnings

  - name: test
    command: cargo test --all

  - name: build
    command: cargo build --release
    artifacts:
      - "target/release/myapp"

# High-memory context for resource-intensive builds
---
name: heavy-build
context: high-memory
timeout: 1800

env:
  CI: "true"
  RUSTFLAGS: "-C target-cpu=native"

steps:
  - name: full-build
    command: |
      cargo build --release --features full
      strip target/release/heavy-app
    artifacts:
      - "target/release/heavy-app"
