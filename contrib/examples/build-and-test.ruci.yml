# Example job: Build and Test
# Save as .ruci.yml in your project root

name: build-and-test
context: default
timeout: 600

env:
  CI: "true"
  RUST_BACKTRACE: "1"

steps:
  - name: dependencies
    command: cargo fetch

  - name: build
    command: cargo build --release

  - name: test
    command: cargo test --all

  - name: clippy
    command: cargo clippy --all-targets -- -D warnings

  - name: fmt-check
    command: cargo fmt --all -- --check

  - name: bench
    command: cargo bench --no-run
